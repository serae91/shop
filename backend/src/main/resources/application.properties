# -----------------------------------------------------------
# SERVER / PORT
# -----------------------------------------------------------
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0
# -----------------------------------------------------------
# CORS
# -----------------------------------------------------------
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.access-control-allow-origin=true
quarkus.http.cors.methods=GET,PATCH,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,content-disposition
quarkus.websockets-next.origins=${quarkus.http.cors.origins}
# -----------------------------------------------------------
# AUTH
# -----------------------------------------------------------
quarkus.http.auth.proactive=false
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=permit
# -----------------------------------------------------------
# JWT
# -----------------------------------------------------------
mp.jwt.verify.issuer=shop
%dev.mp.jwt.verify.publickey=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXphc2RmZ2g=
%dev.smallrye.jwt.sign.key=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXphc2RmZ2g=
%dev.smallrye.jwt.sign.key-format=BASE64
%prod.mp.jwt.verify.publickey=${JWT_SECRET}
%prod.smallrye.jwt.sign.key=${JWT_SECRET}
%prod.smallrye.jwt.sign.key-format=BASE64
jwt.expiration.seconds=3600
# -----------------------------------------------------------
# DATABASE
# -----------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5430}/shop-db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:shopper}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:sAfe_Pass5ord}
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=2
# -----------------------------------------------------------
# FLYWAY
# -----------------------------------------------------------
quarkus.flyway.migrate-at-start=${QUARKUS_FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration,db/testdata
# -----------------------------------------------------------
# HIBERNATE / BLAZE PERSISTENCE
# -----------------------------------------------------------
quarkus.hibernate-orm.scripts.generation=none
blaze.persistence.entity-view.configuration.classes=com.example.view.*
# -----------------------------------------------------------
# LOGGING
# -----------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.console.level=INFO
quarkus.log.category."io.quarkus.vertx.http.runtime.security".level=DEBUG
# -----------------------------------------------------------
# EXTERNAL SERVICES
# -----------------------------------------------------------
gemini-api/mp-rest/url=https://generativelanguage.googleapis.com
# -----------------------------------------------------------
# RATE LIMITER
# -----------------------------------------------------------
quarkus.rate-limiter.buckets.gemini-api.limits[0].permitted-uses=10
quarkus.rate-limiter.buckets.gemini-api.limits[0].period=60S
quarkus.rate-limiter.buckets.gemini-api.limits[1].permitted-uses=250
quarkus.rate-limiter.buckets.gemini-api.limits[1].period=24h